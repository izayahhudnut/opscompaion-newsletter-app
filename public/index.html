<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newsletter Signup</title>
    <style>
      :root {
        font-family: Arial, sans-serif;
        color: #1f2937;
        background: #f5f5f4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 420px);
        background: #ffffff;
        border: 1px solid #d6d3d1;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(28, 25, 23, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 16px;
        color: #57534e;
      }

      form {
        display: grid;
        gap: 12px;
      }

      input,
      button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #d6d3d1;
        padding: 12px 14px;
        font: inherit;
      }

      button {
        background: #1c1917;
        color: #ffffff;
        border: none;
        cursor: pointer;
      }

      #message {
        min-height: 24px;
        margin-top: 12px;
        font-weight: 600;
      }

      .error {
        color: #b91c1c;
      }

      .success {
        color: #15803d;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Join the newsletter</h1>
      <p>Enter your email to subscribe.</p>

      <form id="signup-form">
        <input id="email" type="email" placeholder="you@example.com" required />
        <button type="submit">Sign up</button>
      </form>

      <div id="message" aria-live="polite"></div>
    </main>

    <script src="/app.js"></script>
  </body>
  </html>
